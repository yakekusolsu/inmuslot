<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INMU SLOT MACHINE - Tatarigami Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@800&display=swap');
        
        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background-color: #000;
            color: white;
            overflow: hidden;
            touch-action: manipulation;
            transition: background-color 0.5s;
            background-image: url('./image/back.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fever-bg {
            background-color: rgba(69, 10, 10, 0.6) !important;
            background-blend-mode: overlay;
        }

        /* モバイル対応: 画面が小さい場合に全体を縮小 */
        #app-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        @media (max-width: 480px) {
            #app-container {
                transform: scale(0.85);
                transform-origin: center center;
            }
        }

        @media (max-height: 700px) and (max-width: 480px) {
            #app-container {
                transform: scale(0.75);
            }
        }

        #app-container {
            background-color: rgba(24, 24, 27, 0.85);
            backdrop-filter: blur(8px);
            width: 100%;
            max-width: 400px;
            padding: 1.5rem;
            border: 10px solid #27272a;
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        #entry-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease-out;
        }

        .reel {
            height: 120px;
            width: 90px;
            background: rgba(26, 26, 26, 0.9);
            border: 2px solid #333;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }

        @media (min-width: 400px) {
            .reel {
                height: 150px;
                width: 110px;
            }
        }

        .reel::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(180deg, 
                rgba(0,0,0,0.8) 0%, 
                transparent 25%, 
                transparent 75%, 
                rgba(0,0,0,0.8) 100%);
            z-index: 10;
            pointer-events: none;
        }

        .reel-inner {
            position: absolute;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            will-change: transform;
        }

        .symbol {
            height: 120px;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            user-select: none;
            padding: 5px;
        }

        @media (min-width: 400px) {
            .symbol { height: 150px; }
        }

        .symbol img {
            width: 70px;
            height: 70px;
            object-fit: contain;
            border-radius: 8px;
        }

        @media (min-width: 400px) {
            .symbol img { width: 90px; height: 90px; }
        }

        .symbol-label {
            font-size: 0.6rem;
            margin-top: 4px;
            font-weight: bold;
            color: #ddd;
            background: rgba(0,0,0,0.6);
            padding: 1px 4px;
            border-radius: 3px;
        }

        .blur { filter: blur(4px) opacity(0.6); }

        @keyframes win-glow {
            0% { box-shadow: 0 0 10px #facc15; border-color: #facc15; }
            100% { box-shadow: 0 0 40px #f59e0b; border-color: #ffffff; }
        }

        .win-active { animation: win-glow 0.2s ease-in-out infinite alternate; }

        .btn-spin {
            display: block;
            width: 100%;
            max-width: 280px;
            height: 100px;
            margin: 0 auto;
            background-image: url('./image/spin_1.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            background-color: transparent;
            border: none;
            transition: transform 0.05s ease-out;
            cursor: pointer;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-fever {
            background-image: url('./image/spin_2.png') !important;
            filter: drop-shadow(0 0 15px #facc15);
        }

        .btn-spin:active:not(:disabled) { transform: scale(0.92) translateY(4px); }
        .btn-spin:disabled { filter: grayscale(1) opacity(0.3); transform: translateY(2px); }

        .jackpot-text { animation: rainbow 1s linear infinite; }
        @keyframes rainbow {
            0% { color: #ff0000; }
            25% { color: #ffff00; }
            50% { color: #00ff00; }
            75% { color: #00ffff; }
            100% { color: #ff00ff; }
        }

        .fever-label {
            position: absolute;
            top: -15px;
            right: -5px;
            background: red;
            color: white;
            padding: 2px 8px;
            font-size: 10px;
            border-radius: 20px;
            transform: rotate(15deg);
            box-shadow: 0 0 10px red;
            z-index: 20;
            display: none;
        }

        .bet-btn {
            background: rgba(39, 39, 42, 0.8);
            border: 2px solid #3f3f46;
            transition: all 0.2s;
            cursor: pointer;
            font-size: 10px;
        }
        .bet-btn.active {
            background: #facc15;
            color: black;
            border-color: #ffffff;
            box-shadow: 0 0 10px #facc15;
        }

        #title-logo {
            max-width: 220px;
            height: auto;
            margin: 0 auto;
        }

        input[type="range"] { accent-color: #facc15; }
    </style>
</head>
<body>

    <div id="entry-overlay">
        <img src="./image/真夏の夜のカジノ.png" alt="Logo" class="w-48 mb-6">
        <h1 class="text-xl mb-6 text-yellow-500 italic text-center">24歳、カジノです</h1>
        <button id="entry-btn" class="bg-red-600 hover:bg-red-500 text-white px-10 py-3 rounded-full text-xl font-black shadow-[0_0_20px_red] transition-transform active:scale-95">
            入店する
        </button>
        <p class="mt-6 text-zinc-500 text-xs italic">※クリックするとBGMがループ再生されます</p>
    </div>

    <audio id="audio-bgm" src="./audio/yaranaika.mp3" preload="auto" loop></audio>
    <audio id="audio-ikisugi" src="./audio/ikisugi.wav" preload="auto"></audio>
    <audio id="audio-sodayo" src="./audio/sodayo.wav" preload="auto"></audio>
    <audio id="audio-yametekure" src="./audio/yametekure.wav" preload="auto"></audio>
    <audio id="audio-yattaze" src="./audio/yattaze.wav" preload="auto"></audio>
    <audio id="audio-iiyo" src="./audio/114514.wav" preload="auto"></audio>
    <audio id="audio-spin" src="./audio/butchipa.wav" preload="auto" loop></audio>

    <div id="app-wrapper">
        <div id="app-container" class="relative overflow-hidden">
            
            <div class="absolute top-3 right-4 flex flex-col items-center">
                <span class="text-[7px] text-zinc-500 mb-1">BGM VOL</span>
                <input type="range" id="bgm-volume" min="0" max="1" step="0.01" value="0.5" class="w-16 h-1 bg-zinc-700 rounded-lg appearance-none cursor-pointer">
            </div>

            <div class="text-center mt-4 mb-4 flex justify-center">
                <img id="title-logo" src="./image/真夏の夜のカジノ.png" alt="真夏の夜のカジノ">
            </div>

            <div class="grid grid-cols-2 gap-3 mb-4">
                <div class="bg-black/80 rounded-xl p-2 border-2 border-zinc-700 shadow-inner">
                    <span class="text-[8px] text-zinc-500 block uppercase">Credit</span>
                    <span id="balance" class="text-2xl font-mono text-green-500">1000</span>
                </div>
                <div class="bg-black/80 rounded-xl p-2 border-2 border-zinc-700 shadow-inner text-right relative">
                    <div id="fever-count-badge" class="fever-label">FEVER: <span id="fever-remaining">0</span></div>
                    <span class="text-[8px] text-zinc-500 block uppercase">Payout</span>
                    <span id="payout" class="text-2xl font-mono text-yellow-500">0</span>
                </div>
            </div>

            <div class="flex justify-between gap-1 mb-4">
                <button onclick="changeBet(10)" data-amount="10" class="bet-btn active flex-1 py-1 rounded-md font-bold">10</button>
                <button onclick="changeBet(50)" data-amount="50" class="bet-btn flex-1 py-1 rounded-md font-bold">50</button>
                <button onclick="changeBet(100)" data-amount="100" class="bet-btn flex-1 py-1 rounded-md font-bold">100</button>
                <button onclick="changeBet(500)" data-amount="500" class="bet-btn flex-1 py-1 rounded-md font-bold">500</button>
            </div>

            <div id="machine-frame" class="bg-black/60 p-2 rounded-2xl border-2 border-zinc-800 flex justify-center gap-1 shadow-2xl transition-all duration-300 relative">
                <div class="reel"><div id="reel1" class="reel-inner"></div></div>
                <div class="reel"><div id="reel2" class="reel-inner"></div></div>
                <div class="reel"><div id="reel3" class="reel-inner"></div></div>
            </div>

            <div id="msg" class="h-12 flex items-center justify-center text-center font-bold text-sm text-zinc-300 italic">
                やってやりましょうよ！
            </div>

            <div class="mt-2 flex flex-col gap-4">
                <button id="spin-btn" class="btn-spin" aria-label="SPIN"></button>
                <div class="flex justify-between items-center px-1">
                    <div id="bet-display" class="text-[10px] font-bold text-zinc-500">BET: 10</div>
                    <button id="reset-btn" class="text-[9px] text-zinc-600 underline hover:text-zinc-400">
                        再走（リセット）
                    </button>
                </div>
            </div>

            <div id="flash-overlay" class="fixed inset-0 pointer-events-none z-50 opacity-0 bg-white transition-opacity duration-100"></div>
        </div>
    </div>

    <script>
        const charData = [
            { id: 'yjsp', name: '野獣先輩', src: './image/yjsp.png', multiplier: 81, weight: 2 },
            { id: 'mur', name: 'MUR', src: './image/mur.png', multiplier: 11, weight: 5 },
            { id: 'kmr', name: 'KMR', src: './image/kmr.png', multiplier: 5, weight: 10 },
            { id: 'inmukun', name: '淫夢くん', src: './image/inmukun.png', multiplier: 2, weight: 15 },
            { id: 'kuso', name: '変態糞親父', src: './image/kuso.png', multiplier: 3, weight: 25 }
        ];

        const feverSymbol = { id: 'logo', name: 'JackPot', src: './image/logo.png', multiplier: 1145, weight: 1 };

        let balance = 1000;
        let betAmount = 10;
        let isSpinning = false;
        let isFever = false;
        let feverRemaining = 0;
        const REEL_SPEED = [1200, 1600, 2000]; // モバイル向けに少し高速化

        const reelInners = [
            document.getElementById('reel1'),
            document.getElementById('reel2'),
            document.getElementById('reel3')
        ];
        const balanceEl = document.getElementById('balance');
        const payoutEl = document.getElementById('payout');
        const spinBtn = document.getElementById('spin-btn');
        const msgEl = document.getElementById('msg');
        const frameEl = document.getElementById('machine-frame');
        const flashEl = document.getElementById('flash-overlay');
        const feverBadge = document.getElementById('fever-count-badge');
        const feverRemainingEl = document.getElementById('fever-remaining');
        const titleLogo = document.getElementById('title-logo');
        const betDisplay = document.getElementById('bet-display');
        const bgmVolumeSlider = document.getElementById('bgm-volume');
        
        const audioElements = {
            bgm: document.getElementById('audio-bgm'),
            ikisugi: document.getElementById('audio-ikisugi'),
            sodayo: document.getElementById('audio-sodayo'),
            yametekure: document.getElementById('audio-yametekure'),
            yattaze: document.getElementById('audio-yattaze'),
            iiyo: document.getElementById('audio-iiyo'),
            spin: document.getElementById('audio-spin')
        };

        audioElements.bgm.volume = 0.5;
        bgmVolumeSlider.addEventListener('input', (e) => {
            audioElements.bgm.volume = e.target.value;
        });

        function safePlay(audio) {
            if (!audio) return;
            audio.currentTime = 0;
            audio.play().catch(() => {});
        }

        document.getElementById('entry-btn').addEventListener('click', async () => {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (AudioContext) {
                const ctx = new AudioContext();
                if (ctx.state === 'suspended') await ctx.resume();
            }

            Object.values(audioElements).forEach(a => {
                a.play().then(() => {
                    if (a !== audioElements.bgm) {
                        a.pause();
                        a.currentTime = 0;
                    } else {
                        a.loop = true;
                    }
                }).catch(() => {});
            });
            
            const overlay = document.getElementById('entry-overlay');
            overlay.style.opacity = '0';
            setTimeout(() => overlay.style.display = 'none', 500);
        });

        function init() {
            reelInners.forEach(reel => {
                reel.innerHTML = '';
                for (let i = 0; i < 3; i++) {
                    createSymbol(reel, charData[Math.floor(Math.random() * charData.length)]);
                }
            });
            updateUI();
        }

        function createSymbol(container, data, isBlur = false) {
            const div = document.createElement('div');
            div.className = `symbol ${isBlur ? 'blur' : ''}`;
            div.innerHTML = `<img src="${data.src}" alt="${data.name}" onerror="this.src='https://via.placeholder.com/90?text=ERR'"><span class="symbol-label">${data.name}</span>`;
            container.appendChild(div);
            return div;
        }

        function changeBet(amount) {
            if (isSpinning) return;
            betAmount = amount;
            document.querySelectorAll('.bet-btn').forEach(btn => {
                btn.classList.toggle('active', parseInt(btn.getAttribute('data-amount')) === betAmount);
            });
            betDisplay.textContent = `BET: ${betAmount}`;
            updateUI();
        }

        function getWeightedChar() {
            let pool = [...charData];
            if (isFever) pool.push(feverSymbol);
            const total = pool.reduce((s, c) => s + c.weight, 0);
            let r = Math.random() * total;
            for (const c of pool) {
                if (r < c.weight) return c;
                r -= c.weight;
            }
            return pool[0];
        }

        async function startSpin() {
            if (isSpinning || balance < betAmount) return;

            Object.values(audioElements).forEach(audio => {
                if (audio !== audioElements.spin && audio !== audioElements.bgm) {
                    audio.pause(); audio.currentTime = 0;
                }
            });

            isSpinning = true;
            balance -= betAmount;
            updateUI(); 
            safePlay(audioElements.spin);

            msgEl.textContent = isFever ? 'ｲｷｽｷﾞｨ!!ｲｸｲｸ…' : 'いいよ！来いよ！';
            msgEl.className = `h-12 flex items-center justify-center text-center font-bold text-sm italic ${isFever ? 'text-yellow-300 animate-pulse' : 'text-blue-400'}`;
            
            frameEl.classList.remove('win-active');
            const results = await Promise.all(reelInners.map((reel, i) => animateReel(reel, i)));
            
            if (audioElements.spin) audioElements.spin.pause();
            evaluate(results);
            isSpinning = false;
            updateUI();
        }

        function animateReel(reel, index) {
            return new Promise(resolve => {
                const targetChar = getWeightedChar();
                const dummyCount = 15 + (index * 8);
                const duration = REEL_SPEED[index];
                const symHeight = window.innerWidth < 400 ? 120 : 150;

                const currentHTML = reel.firstElementChild ? reel.firstElementChild.innerHTML : '';
                reel.innerHTML = '';
                const startSym = document.createElement('div');
                startSym.className = 'symbol';
                startSym.innerHTML = currentHTML;
                reel.appendChild(startSym);

                for(let i=0; i<dummyCount; i++) {
                    const randomChar = (isFever && Math.random() < 0.1) ? feverSymbol : charData[Math.floor(Math.random() * charData.length)];
                    createSymbol(reel, randomChar, true);
                }
                createSymbol(reel, targetChar);
                createSymbol(reel, charData[0]);

                reel.style.transition = 'none';
                reel.style.transform = 'translateY(0px)';
                requestAnimationFrame(() => {
                    reel.style.transition = `transform ${duration}ms cubic-bezier(0.4, 0, 0.2, 1.1)`;
                    reel.style.transform = `translateY(-${(dummyCount + 1) * symHeight}px)`;
                });

                setTimeout(() => {
                    reel.style.transition = 'none';
                    reel.style.transform = 'translateY(0px)';
                    reel.innerHTML = '';
                    createSymbol(reel, targetChar);
                    createSymbol(reel, charData[0]);
                    createSymbol(reel, charData[1]);
                    resolve(targetChar);
                }, duration);
            });
        }

        function evaluate(results) {
            const [c1, c2, c3] = results;
            let win = 0;

            if (c1.id === c2.id && c2.id === c3.id) {
                win = c1.multiplier * betAmount; 
                msgEl.textContent = `や　っ　た　ぜ (+${win})`;
                msgEl.className = 'h-12 flex items-center justify-center text-center font-bold text-xl jackpot-text';
                triggerFlash();
                if (c1.id === 'yjsp') {
                    safePlay(audioElements.ikisugi);
                    if (!isFever) startFever();
                } else if (c1.id === 'mur') safePlay(audioElements.sodayo);
                else if (c1.id === 'kmr') safePlay(audioElements.yametekure);
                else if (c1.id === 'kuso') safePlay(audioElements.yattaze);
            } else {
                const yajuuCount = results.filter(c => c.id === 'yjsp').length;
                if (yajuuCount === 2) {
                    win = Math.floor(betAmount * 5); 
                    msgEl.textContent = `い　い　よ (+${win})`;
                    msgEl.className = 'h-12 flex items-center justify-center text-center font-bold text-sm text-yellow-400';
                    safePlay(audioElements.iiyo);
                } else {
                    msgEl.textContent = 'ヌッ！';
                    msgEl.className = 'h-12 flex items-center justify-center text-center font-bold text-sm text-zinc-500';
                }
            }

            if (win > 0) {
                balance += win;
                payoutEl.textContent = win;
                frameEl.classList.add('win-active');
            }
            if (isFever) {
                feverRemaining--;
                if (feverRemaining <= 0) endFever();
            }
        }

        function startFever() {
            isFever = true;
            feverRemaining = 10;
            document.body.classList.add('fever-bg');
            spinBtn.classList.add('btn-fever'); 
            feverBadge.style.display = 'block';
        }

        function endFever() {
            isFever = false;
            document.body.classList.remove('fever-bg');
            spinBtn.classList.remove('btn-fever');
            feverBadge.style.display = 'none';
        }

        function triggerFlash() {
            flashEl.style.opacity = '1';
            setTimeout(() => flashEl.style.opacity = '0', 100);
        }

        function updateUI() {
            balanceEl.textContent = balance;
            feverRemainingEl.textContent = feverRemaining;
            document.querySelectorAll('.bet-btn').forEach(btn => {
                btn.disabled = isSpinning || balance < parseInt(btn.getAttribute('data-amount'));
            });
            spinBtn.disabled = isSpinning || balance < betAmount;
        }

        spinBtn.addEventListener('click', startSpin);
        document.getElementById('reset-btn').addEventListener('click', () => {
            if(isSpinning) return;
            balance = 1000;
            payoutEl.textContent = '0';
            endFever();
            changeBet(10);
            init();
        });

        init();
    </script>
</body>
</html>
