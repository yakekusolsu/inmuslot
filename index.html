<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INMU SLOT MACHINE - Tatarigami Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@800&display=swap');
        
        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background-color: #000;
            color: white;
            overflow-y: auto;
            touch-action: pan-y;
            transition: background-color 0.5s;
            background-image: url('./image/back.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px 0;
        }

        .fever-bg {
            background-color: rgba(69, 10, 10, 0.6) !important;
            background-blend-mode: overlay;
        }

        #main-layout {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 800px;
            padding: 10px;
            transition: all 0.3s ease;
        }

        /* UIモード切替 */
        .ui-pc #main-layout { flex-direction: row; align-items: flex-start; justify-content: center; }
        .ui-pc #side-panel { max-width: 240px; position: sticky; top: 20px; display: flex; }
        .ui-pc .reel { height: 150px; width: 110px; }
        .ui-pc .symbol { height: 150px; }
        .ui-pc .symbol img { width: 90px; height: 90px; }

        .ui-mobile #main-layout { flex-direction: column; align-items: center; }
        .ui-mobile #side-panel { max-width: 400px; position: relative; }
        .ui-mobile .reel { height: 120px; width: 90px; }
        .ui-mobile .symbol { height: 120px; }
        .ui-mobile .symbol img { width: 70px; height: 70px; }

        #app-container {
            background-color: rgba(24, 24, 27, 0.9);
            backdrop-filter: blur(12px);
            width: 100%;
            max-width: 400px;
            padding: 1.5rem;
            border: 10px solid #27272a;
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            flex-shrink: 0;
        }

        #side-panel { width: 100%; display: flex; flex-direction: column; gap: 15px; }

        .side-card {
            background: rgba(39, 39, 42, 0.8);
            border: 2px solid #52525b;
            border-radius: 20px;
            padding: 1.5rem;
            text-align: center;
            backdrop-filter: blur(8px);
        }

        #entry-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.95);
            z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .ui-select-label:has(input:checked) { background-color: #3f3f46; border-color: #facc15; color: #facc15; }

        .reel {
            background: rgba(26, 26, 26, 0.9);
            border: 2px solid #333;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }

        .reel::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 25%, transparent 75%, rgba(0,0,0,0.8) 100%);
            z-index: 10; pointer-events: none;
        }

        .reel-inner { position: absolute; width: 100%; display: flex; flex-direction: column; align-items: center; }

        .symbol { width: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 5px; }
        .symbol img { object-fit: contain; border-radius: 8px; }
        .symbol-label { font-size: 0.6rem; margin-top: 4px; color: #ddd; background: rgba(0,0,0,0.6); padding: 1px 4px; border-radius: 3px; }

        .blur { filter: blur(4px) opacity(0.6); }

        @keyframes win-glow {
            0% { box-shadow: 0 0 10px #facc15; border-color: #facc15; }
            100% { box-shadow: 0 0 40px #f59e0b; border-color: #ffffff; }
        }
        .win-active { animation: win-glow 0.2s ease-in-out infinite alternate; }

        .btn-spin {
            display: block; width: 100%; max-width: 280px; height: 100px; margin: 0 auto;
            background-image: url('./image/spin_1.png'); background-size: contain; background-repeat: no-repeat;
            background-position: center; background-color: transparent; border: none; cursor: pointer;
        }
        .btn-fever { background-image: url('./image/spin_2.png') !important; filter: drop-shadow(0 0 15px #facc15); }
        .btn-spin:active:not(:disabled) { transform: scale(0.92); }
        .btn-spin:disabled { filter: grayscale(1) opacity(0.3); }

        .fever-label {
            position: absolute; top: -15px; right: -5px; background: red; color: white;
            padding: 2px 8px; font-size: 10px; border-radius: 20px; transform: rotate(15deg);
            box-shadow: 0 0 10px red; z-index: 20; display: none;
        }

        .bet-btn { background: rgba(39, 39, 42, 0.8); border: 2px solid #3f3f46; cursor: pointer; font-size: 10px; padding: 4px; }
        .bet-btn.active { background: #facc15; color: black; border-color: #ffffff; box-shadow: 0 0 10px #facc15; }

        #share-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200;
            display: none; align-items: center; justify-content: center; padding: 20px;
        }

        .share-button-glow { background: linear-gradient(45deg, #000, #1DA1F2); box-shadow: 0 4px 15px rgba(29, 161, 242, 0.4); }

        #promo-input::placeholder {
            color: #52525b;
            font-size: 0.75rem;
        }

        #debug-panel { display: none; border: 2px dashed #facc15; background: rgba(254, 240, 138, 0.1); }
        
        /* オートスピン用スタイル */
        .auto-active { background: #16a34a !important; color: white !important; border-color: #4ade80 !important; box-shadow: 0 0 15px #16a34a; }
    </style>
</head>
<body class="ui-mobile">

    <div id="entry-overlay">
        <img src="./image/真夏の夜のカジノ.png" alt="Logo" class="w-48 mb-6">
        <h1 class="text-xl mb-6 text-yellow-500 italic text-center">24歳、カジノです</h1>
        <button id="entry-btn" class="bg-red-600 hover:bg-red-500 text-white px-10 py-3 rounded-full text-xl font-black shadow-[0_0_20px_red]">入店する</button>
        <div class="mt-8 flex flex-col items-center">
            <p class="text-zinc-400 text-sm mb-3 font-bold">プレイ環境を選択</p>
            <div class="flex gap-4 bg-zinc-900 p-2 rounded-xl border border-zinc-700">
                <label class="cursor-pointer flex items-center gap-2 text-sm text-white px-4 py-2 rounded-lg ui-select-label"><input type="radio" name="ui-mode" value="mobile" checked>📱 スマホ</label>
                <label class="cursor-pointer flex items-center gap-2 text-sm text-white px-4 py-2 rounded-lg ui-select-label"><input type="radio" name="ui-mode" value="pc">💻 PC</label>
            </div>
        </div>
    </div>

    <div id="share-modal">
        <div class="bg-zinc-900 border-2 border-yellow-500 p-8 rounded-3xl text-center max-w-sm w-full">
            <div id="modal-icon" class="text-5xl mb-4">🙏</div>
            <h2 id="modal-title" class="text-2xl font-bold text-yellow-500 mb-4">共有ボーナス！</h2>
            <p id="modal-desc" class="text-sm text-zinc-300 mb-8">𝕏でポストしてクレジットを回復しました！</p>
            <button onclick="closeShareModal()" class="w-full bg-yellow-500 text-black py-4 rounded-xl font-black">ありがとナス！</button>
        </div>
    </div>

    <audio id="audio-bgm" src="./audio/yaranaika.mp3" loop></audio>
    <audio id="audio-fever" src="./audio/4545.mp3" loop></audio>
    <audio id="audio-ikisugi" src="./audio/ikisugi.wav"></audio>
    <audio id="audio-sodayo" src="./audio/sodayo.wav"></audio>
    <audio id="audio-yametekure" src="./audio/yametekure.wav"></audio>
    <audio id="audio-yattaze" src="./audio/yattaze.wav"></audio>
    <audio id="audio-iiyo" src="./audio/114514.wav"></audio>
    <audio id="audio-spin" src="./audio/butchipa.wav" loop></audio>
    <audio id="audio-nasu" src="./audio/nasu.wav"></audio>

    <div id="main-layout">
        <div id="app-container" class="relative">
            <div class="absolute top-3 right-4 flex flex-col items-center">
                <span class="text-[7px] text-zinc-500 mb-1">VOL</span>
                <input type="range" id="bgm-volume" min="0" max="1" step="0.01" value="0.5" class="w-16 h-1 bg-zinc-700 rounded-lg appearance-none">
            </div>

            <div class="text-center mt-4 mb-4 flex justify-center"><img id="title-logo" src="./image/真夏の夜のカジノ.png" alt="Logo"></div>

            <div class="grid grid-cols-2 gap-3 mb-4">
                <div class="bg-black/80 rounded-xl p-2 border-2 border-zinc-700">
                    <span class="text-[8px] text-zinc-500 block uppercase">Credit</span>
                    <span id="balance" class="text-2xl font-mono text-green-500">1000</span>
                </div>
                <div class="bg-black/80 rounded-xl p-2 border-2 border-zinc-700 text-right relative">
                    <div id="fever-count-badge" class="fever-label">FEVER: <span id="fever-remaining">0</span></div>
                    <span class="text-[8px] text-zinc-500 block uppercase">Payout</span>
                    <span id="payout" class="text-2xl font-mono text-yellow-500">0</span>
                </div>
            </div>

            <div class="flex justify-between gap-1 mb-4">
                <button onclick="changeBet(10)" data-amount="10" class="bet-btn active flex-1 rounded-md font-bold">10</button>
                <button onclick="changeBet(50)" data-amount="50" class="bet-btn flex-1 rounded-md font-bold">50</button>
                <button onclick="changeBet(100)" data-amount="100" class="bet-btn flex-1 rounded-md font-bold">100</button>
                <button onclick="changeBet(500)" data-amount="500" class="bet-btn flex-1 rounded-md font-bold">500</button>
            </div>

            <div id="machine-frame" class="bg-black/60 p-2 rounded-2xl border-2 border-zinc-800 flex justify-center gap-1">
                <div class="reel"><div id="reel1" class="reel-inner"></div></div>
                <div class="reel"><div id="reel2" class="reel-inner"></div></div>
                <div class="reel"><div id="reel3" class="reel-inner"></div></div>
            </div>

            <div id="msg" class="h-12 flex items-center justify-center text-center font-bold text-sm text-zinc-300 italic">やってやりましょうよ！</div>

            <div class="mt-2 flex flex-col gap-4">
                <button id="spin-btn" class="btn-spin"></button>
                <div class="flex justify-between items-center px-1">
                    <div id="bet-display" class="text-[10px] font-bold text-zinc-500 uppercase">BET: 10</div>
                    <button id="reset-btn" class="text-[9px] text-zinc-600 underline">再走（リセット）</button>
                </div>
            </div>
            <div id="flash-overlay" class="fixed inset-0 pointer-events-none z-50 opacity-0 bg-white transition-opacity duration-100"></div>
        </div>

        <div id="side-panel">
            <div id="share-card" class="side-card share-button-glow border-none">
                <h3 class="text-white text-xs font-black mb-2">𝕏 で共有</h3>
                <p class="text-[10px] text-blue-100 mb-4">ポストしてクレジットを回復（+200枚）<br><span id="share-remaining-label" class="text-[9px] opacity-70">残り: 10回</span></p>
                <button id="share-btn" class="w-full bg-white text-black py-3 rounded-full font-black text-sm">共有して回復する</button>
            </div>

            <div class="side-card">
                <h3 class="text-zinc-400 text-[10px] font-bold mb-3 uppercase tracking-tighter">Secret Code</h3>
                <div class="flex gap-2">
                    <input type="text" id="promo-input" placeholder="コードを入力..." class="flex-1 bg-black border border-zinc-600 rounded-lg px-3 py-2 text-xs font-mono focus:outline-none focus:border-yellow-500 text-yellow-500">
                    <button id="promo-btn" class="bg-zinc-700 hover:bg-zinc-600 text-white text-[10px] px-3 rounded-lg font-black transition-colors">適用</button>
                </div>
                <p id="promo-error" class="text-[8px] text-red-500 mt-2 opacity-0">使用済みか無効なコードです</p>
            </div>

            <div class="side-card">
                <h3 class="text-zinc-400 text-[10px] font-bold mb-3 uppercase tracking-tighter">Auto Play</h3>
                <button id="auto-spin-btn" class="w-full bg-zinc-800 border-2 border-zinc-700 py-3 rounded-xl font-black text-xs transition-all">オートスピン開始<br><span class="text-[8px] opacity-60">(1回ごとに+10枚)</span></button>
            </div>

            <div id="debug-panel" class="side-card">
                <h3 class="text-yellow-500 text-[10px] font-bold mb-3 uppercase">Developer Debug</h3>
                <button id="force-fever-btn" class="w-full bg-red-600 hover:bg-red-500 text-white py-2 rounded-lg font-black text-[10px] transition-all border-b-4 border-red-800 active:border-b-0 active:translate-y-1">強制フィーバー起動</button>
                <p class="text-[8px] text-zinc-400 mt-2">デバッグモード有効</p>
            </div>

            <div class="side-card opacity-60">
                <h3 class="text-zinc-400 text-[10px] font-bold mb-2">遊び方</h3>
                <div class="text-[9px] text-zinc-500 text-left">
                    ・BET額を選んでスピン！<br>
                    ・野獣先輩揃いでFEVER突入<br>
                    ・FEVER中はJackpot出現率UP！<br>
                    ・破産したら共有で回復ナス
                </div>
            </div>
        </div>
    </div>

    <script>
        // UI切替
        const uiRadios = document.querySelectorAll('input[name="ui-mode"]');
        const isPC = window.innerWidth >= 768;
        
        document.body.className = isPC ? 'ui-pc' : 'ui-mobile';
        
        uiRadios.forEach(radio => {
            if ((radio.value === 'pc' && isPC) || (radio.value === 'mobile' && !isPC)) {
                radio.checked = true;
            }
            radio.addEventListener('change', (e) => {
                document.body.className = `ui-${e.target.value}`;
            });
        });

        // デバッグモード(Shift + Space)
        let debugMode = false;
        window.addEventListener('keydown', e => {
            if (e.shiftKey && e.code === 'Space') {
                e.preventDefault();
                debugMode = !debugMode;
                document.getElementById('debug-panel').style.display = debugMode ? 'block' : 'none';
                if(debugMode) {
                    document.body.className = 'ui-pc';
                    const pcRadio = document.querySelector('input[value="pc"]');
                    if (pcRadio) pcRadio.checked = true;
                }
            }
        });

        // スロットデータ
        const charData = [
            { id: 'yjsp', name: '野獣先輩', src: './image/yjsp.png', multiplier: 81, weight: 2 },
            { id: 'mur', name: 'MUR', src: './image/mur.png', multiplier: 11, weight: 5 },
            { id: 'kmr', name: 'KMR', src: './image/kmr.png', multiplier: 5, weight: 10 },
            { id: 'inmukun', name: '淫夢くん', src: './image/inmukun.png', multiplier: 2, weight: 15 },
            { id: 'kuso', name: '変態糞親父', src: './image/kuso.png', multiplier: 3, weight: 25 }
        ];

        const feverSymbol = { id: 'logo', name: 'JackPot', src: './image/logo.png', multiplier: 1145, weight: 1 };

        let balance = 1000;
        let betAmount = 10;
        let isSpinning = false;
        let isFever = false;
        let feverRemaining = 0;
        let isAutoSpin = false;
        
        // 制限用ステータス
        let promoUsed = false;
        let shareCount = 0;
        const MAX_SHARE = 10;

        const REEL_SPEED = [1200, 1600, 2000];

        const reelInners = [
            document.getElementById('reel1'),
            document.getElementById('reel2'),
            document.getElementById('reel3')
        ];
        const balanceEl = document.getElementById('balance');
        const payoutEl = document.getElementById('payout');
        const spinBtn = document.getElementById('spin-btn');
        const msgEl = document.getElementById('msg');
        const frameEl = document.getElementById('machine-frame');
        const flashEl = document.getElementById('flash-overlay');
        const feverBadge = document.getElementById('fever-count-badge');
        const feverRemainingEl = document.getElementById('fever-remaining');
        const betDisplay = document.getElementById('bet-display');
        const bgmVolumeSlider = document.getElementById('bgm-volume');
        const shareModal = document.getElementById('share-modal');
        const shareBtn = document.getElementById('share-btn');
        const shareCard = document.getElementById('share-card');
        const shareLabel = document.getElementById('share-remaining-label');
        const promoInput = document.getElementById('promo-input');
        const promoBtn = document.getElementById('promo-btn');
        const promoError = document.getElementById('promo-error');
        const autoSpinBtn = document.getElementById('auto-spin-btn');
        
        const audioElements = {
            bgm: document.getElementById('audio-bgm'),
            fever: document.getElementById('audio-fever'),
            ikisugi: document.getElementById('audio-ikisugi'),
            sodayo: document.getElementById('audio-sodayo'),
            yametekure: document.getElementById('audio-yametekure'),
            yattaze: document.getElementById('audio-yattaze'),
            iiyo: document.getElementById('audio-iiyo'),
            spin: document.getElementById('audio-spin'),
            nasu: document.getElementById('audio-nasu')
        };

        audioElements.bgm.volume = 0.5;
        if(audioElements.fever) audioElements.fever.volume = 0.5;
        
        bgmVolumeSlider.addEventListener('input', (e) => {
            audioElements.bgm.volume = e.target.value;
            audioElements.fever.volume = e.target.value;
        });

        function safePlay(audio) {
            if (!audio) return;
            audio.currentTime = 0;
            audio.play().catch(() => {});
        }

        document.getElementById('entry-btn').addEventListener('click', async () => {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (AudioContext) {
                const ctx = new AudioContext();
                if (ctx.state === 'suspended') await ctx.resume();
            }
            
            Object.values(audioElements).forEach(a => {
                a.play().then(() => { 
                    if (a !== audioElements.bgm && a !== audioElements.fever) { 
                        a.pause(); a.currentTime = 0; 
                    } else if (a === audioElements.bgm) {
                        a.loop = true;
                    } else if (a === audioElements.fever) {
                        a.loop = true;
                        a.pause(); a.currentTime = 0;
                    }
                }).catch(() => {});
            });
            
            const overlay = document.getElementById('entry-overlay');
            overlay.style.opacity = '0';
            setTimeout(() => overlay.style.display = 'none', 500);
        });

        function init() {
            reelInners.forEach(reel => {
                reel.innerHTML = '';
                for (let i = 0; i < 3; i++) createSymbol(reel, charData[Math.floor(Math.random() * charData.length)]);
            });
            updateUI();
        }

        function createSymbol(container, data, isBlur = false) {
            const div = document.createElement('div');
            div.className = `symbol ${isBlur ? 'blur' : ''}`;
            div.innerHTML = `<img src="${data.src}" alt="${data.name}" onerror="this.src='https://via.placeholder.com/90?text=ERR'"><span class="symbol-label">${data.name}</span>`;
            container.appendChild(div);
            return div;
        }

        function changeBet(amount) {
            if (isSpinning) return;
            betAmount = amount;
            document.querySelectorAll('.bet-btn').forEach(btn => {
                btn.classList.toggle('active', parseInt(btn.getAttribute('data-amount')) === betAmount);
            });
            betDisplay.textContent = `BET: ${betAmount}`;
            updateUI();
        }

        function getWeightedChar() {
            let pool = JSON.parse(JSON.stringify(charData)); // 深いコピー
            if (isFever) {
                // フィーバー中の確率調整：Jackpotを追加し、MURと野獣先輩を当たりやすくする
                const feverJackpot = JSON.parse(JSON.stringify(feverSymbol));
                pool.push(feverJackpot);
                
                pool.forEach(c => {
                    if (c.id === 'yjsp') c.weight = 8; // 2 -> 8 (4倍)
                    if (c.id === 'mur') c.weight = 12; // 5 -> 12 (2.4倍)
                });
            }
            
            const total = pool.reduce((s, c) => s + c.weight, 0);
            let r = Math.random() * total;
            for (const c of pool) { if (r < c.weight) return c; r -= c.weight; }
            return pool[0];
        }

        async function startSpin() {
            // 手数料計算
            const totalCost = isAutoSpin ? betAmount + 10 : betAmount;
            
            if (isSpinning || balance < totalCost) {
                if(isAutoSpin) toggleAutoSpin(); // 残高不足ならオート解除
                return;
            }

            Object.values(audioElements).forEach(audio => { 
                if (audio !== audioElements.spin && audio !== audioElements.bgm && audio !== audioElements.fever) { 
                    audio.pause(); audio.currentTime = 0; 
                } 
            });

            isSpinning = true;
            balance -= totalCost;
            updateUI(); 
            safePlay(audioElements.spin);
            msgEl.textContent = isFever ? 'ｲｷｽｷﾞｨ!!ｲｸｲｸ…' : 'いいよ！来いよ！';
            frameEl.classList.remove('win-active');
            
            const results = await Promise.all(reelInners.map((reel, i) => animateReel(reel, i)));
            
            if (audioElements.spin) audioElements.spin.pause();
            evaluate(results);
            isSpinning = false;
            updateUI();

            // オートスピン継続
            if(isAutoSpin) {
                setTimeout(startSpin, 800);
            }
        }

        function animateReel(reel, index) {
            return new Promise(resolve => {
                const targetChar = getWeightedChar();
                const dummyCount = 15 + (index * 8);
                const duration = REEL_SPEED[index];
                
                const isPCMode = document.body.classList.contains('ui-pc');
                const symHeight = isPCMode ? 150 : 120;
                
                const currentHTML = reel.firstElementChild ? reel.firstElementChild.innerHTML : '';
                reel.innerHTML = '';
                const startSym = document.createElement('div');
                startSym.className = 'symbol';
                startSym.innerHTML = currentHTML;
                reel.appendChild(startSym);
                for(let i=0; i<dummyCount; i++) {
                    createSymbol(reel, (isFever && Math.random() < 0.1) ? feverSymbol : charData[Math.floor(Math.random() * charData.length)], true);
                }
                createSymbol(reel, targetChar);
                createSymbol(reel, charData[0]);
                reel.style.transition = 'none';
                reel.style.transform = 'translateY(0px)';
                requestAnimationFrame(() => {
                    reel.style.transition = `transform ${duration}ms cubic-bezier(0.4, 0, 0.2, 1.1)`;
                    reel.style.transform = `translateY(-${(dummyCount + 1) * symHeight}px)`;
                });
                setTimeout(() => {
                    reel.style.transition = 'none';
                    reel.style.transform = 'translateY(0px)';
                    reel.innerHTML = '';
                    createSymbol(reel, targetChar);
                    createSymbol(reel, charData[0]);
                    resolve(targetChar);
                }, duration);
            });
        }

        function evaluate(results) {
            const [c1, c2, c3] = results;
            let win = 0;
            if (c1.id === c2.id && c2.id === c3.id) {
                win = c1.multiplier * betAmount; 
                msgEl.textContent = `や　っ　た　ぜ (+${win})`;
                triggerFlash();
                if (c1.id === 'yjsp') { 
                    safePlay(audioElements.ikisugi); 
                    if (!isFever) startFever(); 
                }
                else if (c1.id === 'mur') safePlay(audioElements.sodayo);
                else if (c1.id === 'kmr') safePlay(audioElements.yametekure);
                else if (c1.id === 'kuso') safePlay(audioElements.yattaze);
                else if (c1.id === 'logo') safePlay(audioElements.ikisugi); // Jackpot
            } else if (results.filter(c => c.id === 'yjsp').length === 2) {
                win = Math.floor(betAmount * 5); 
                msgEl.textContent = `い　い　よ (+${win})`;
                safePlay(audioElements.iiyo);
            } else {
                msgEl.textContent = 'ヌッ！';
            }
            
            if (win > 0) { balance += win; payoutEl.textContent = win; frameEl.classList.add('win-active'); }
            if (isFever) { 
                feverRemaining--; 
                if (feverRemaining <= 0) endFever(); 
            }
        }

        function startFever() {
            isFever = true; 
            // 20~100の間で抽選
            feverRemaining = Math.floor(Math.random() * (100 - 20 + 1)) + 20;
            
            document.body.classList.add('fever-bg');
            spinBtn.classList.add('btn-fever'); 
            feverBadge.style.display = 'block';
            
            audioElements.bgm.pause();
            audioElements.fever.currentTime = 0;
            audioElements.fever.play().catch(()=>{});
        }

        function endFever() {
            isFever = false;
            document.body.classList.remove('fever-bg');
            spinBtn.classList.remove('btn-fever');
            feverBadge.style.display = 'none';
            
            audioElements.fever.pause();
            audioElements.bgm.play().catch(()=>{});
        }

        function triggerFlash() { flashEl.style.opacity = '1'; setTimeout(() => flashEl.style.opacity = '0', 100); }

        function updateUI() {
            balanceEl.textContent = balance;
            feverRemainingEl.textContent = feverRemaining;
            
            const currentTotalCost = isAutoSpin ? betAmount + 10 : betAmount;
            
            document.querySelectorAll('.bet-btn').forEach(btn => btn.disabled = isSpinning || balance < parseInt(btn.getAttribute('data-amount')));
            spinBtn.disabled = isSpinning || balance < currentTotalCost;
            
            shareLabel.textContent = `残り: ${MAX_SHARE - shareCount}回`;
            if (shareCount >= MAX_SHARE) {
                shareBtn.disabled = true;
                shareBtn.textContent = "上限に達しました";
                shareCard.classList.add('disabled');
            }
        }

        function openModal(title, desc, icon = "🙏") {
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-desc').innerHTML = desc;
            document.getElementById('modal-icon').textContent = icon;
            shareModal.style.display = 'flex';
        }

        // オートスピン切り替え
        function toggleAutoSpin() {
            isAutoSpin = !isAutoSpin;
            if(isAutoSpin) {
                autoSpinBtn.classList.add('auto-active');
                autoSpinBtn.innerHTML = 'オートスピン稼働中<br><span class="text-[8px] opacity-80">(ボタンで停止)</span>';
                if(!isSpinning) startSpin();
            } else {
                autoSpinBtn.classList.remove('auto-active');
                autoSpinBtn.innerHTML = 'オートスピン開始<br><span class="text-[8px] opacity-60">(1回ごとに+10枚)</span>';
            }
            updateUI();
        }

        autoSpinBtn.addEventListener('click', toggleAutoSpin);

        document.getElementById('force-fever-btn').addEventListener('click', () => {
            if(!isFever) { 
                startFever(); 
                msgEl.textContent = 'デバッグ：強制起動！'; 
                safePlay(audioElements.ikisugi); 
            }
        });

        shareBtn.addEventListener('click', () => {
            if (shareCount >= MAX_SHARE) return;

            const text = encodeURIComponent(`真夏の夜のカジノ ～THE IMP～ で遊んでます！\nhttps://yakekusolsu.github.io/inmuslot/\n現在の所持金: ${balance}クレジット\n今ならコード「YARANAIKA」で+5000クレジット！\n#真夏の夜のカジノ`);
            window.open(`https://twitter.com/intent/tweet?text=${text}`, '_blank');
            
            setTimeout(() => {
                shareCount++;
                balance += 200;
                updateUI();
                openModal("𝕏 共有ボーナス！", `宣伝ありがとうございます！<br>お礼として<span class="text-green-400 font-bold text-lg">200 CREDIT</span>をチャージしました。`);
                safePlay(audioElements.nasu);
            }, 500);
        });

        promoBtn.addEventListener('click', () => {
            if (promoUsed) {
                promoError.textContent = "このコードは既に使用済みです";
                promoError.classList.remove('opacity-0');
                return;
            }

            const code = promoInput.value.trim().toUpperCase();
            if (code === "YARANAIKA") {
                promoUsed = true;
                balance += 5000;
                updateUI();
                promoInput.value = "";
                promoError.classList.add('opacity-0');
                openModal("隠しコード発見！", `「やらないか」<br>ボーナスとして<span class="text-yellow-400 font-bold text-lg">5,000 CREDIT</span>を差し上げました。`, "🎩");
                safePlay(audioElements.ikisugi);
            } else {
                promoError.textContent = "無効なコードです";
                promoError.classList.remove('opacity-0');
                setTimeout(() => promoError.classList.add('opacity-0'), 2000);
            }
        });

        function closeShareModal() { shareModal.style.display = 'none'; }

        spinBtn.addEventListener('click', startSpin);
        document.getElementById('reset-btn').addEventListener('click', () => {
            if(isSpinning) return;
            balance = 1000; payoutEl.textContent = '0';
            promoUsed = false;
            shareCount = 0;
            isAutoSpin = false;
            autoSpinBtn.classList.remove('auto-active');
            autoSpinBtn.innerHTML = 'オートスピン開始<br><span class="text-[8px] opacity-60">(1回ごとに+10枚)</span>';
            shareBtn.disabled = false;
            shareBtn.textContent = "共有して回復する";
            shareCard.classList.remove('disabled');
            endFever(); changeBet(10); init();
        });

        init();
    </script>
</body>
</html>
