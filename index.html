<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INMU SLOT MACHINE - Tatarigami Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@800&display=swap');
        
        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background-color: #000;
            color: white;
            overflow: hidden;
            touch-action: manipulation;
            transition: background-color 0.5s;
            /* 背景画像の設定 - imageフォルダから参照 */
            background-image: url('image/back.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
        }

        .fever-bg {
            background-color: rgba(69, 10, 10, 0.6) !important;
            background-blend-mode: overlay;
        }

        #app-container {
            background-color: rgba(24, 24, 27, 0.85);
            backdrop-filter: blur(8px);
        }

        /* 入店オーバーレイ */
        #entry-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease-out;
        }

        .reel {
            height: 150px;
            width: 110px;
            background: rgba(26, 26, 26, 0.9);
            border: 2px solid #333;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }

        .reel::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(180deg, 
                rgba(0,0,0,0.8) 0%, 
                transparent 25%, 
                transparent 75%, 
                rgba(0,0,0,0.8) 100%);
            z-index: 10;
            pointer-events: none;
        }

        .reel-inner {
            position: absolute;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            will-change: transform;
        }

        .symbol {
            height: 150px;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            user-select: none;
            padding: 5px;
        }

        .symbol img {
            width: 90px;
            height: 90px;
            object-fit: contain;
            border-radius: 10px;
        }

        .symbol-label {
            font-size: 0.7rem;
            margin-top: 5px;
            font-weight: bold;
            color: #ddd;
            background: rgba(0,0,0,0.6);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .blur {
            filter: blur(8px) opacity(0.5);
        }

        /* SPINボタンの画像化設定 - image/フォルダ参照 */
        .btn-spin {
            width: 100%;
            height: 120px;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            border: none;
            cursor: pointer;
            transition: transform 0.1s;
            outline: none;
            background-color: transparent;
            background-image: url('image/spin_1.png');
        }

        .btn-spin:active:not(:disabled) {
            transform: scale(0.95);
        }

        .btn-spin:disabled {
            filter: grayscale(0.8) brightness(0.5);
            cursor: not-allowed;
        }

        .fever-label {
            position: absolute;
            top: -20px;
            right: -10px;
            background: red;
            color: white;
            padding: 2px 10px;
            font-size: 12px;
            border-radius: 20px;
            transform: rotate(15deg);
            box-shadow: 0 0 10px red;
            z-index: 20;
            display: none;
        }

        .bet-btn {
            background: rgba(39, 39, 42, 0.8);
            border: 2px solid #3f3f46;
            transition: all 0.2s;
            cursor: pointer;
        }
        .bet-btn.active {
            background: #facc15;
            color: black;
            border-color: #ffffff;
            box-shadow: 0 0 10px #facc15;
        }

        #title-logo {
            max-width: 280px;
            height: auto;
            margin: 0 auto;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <!-- 画像のプリロード用（非表示） - 全て image/ フォルダ参照 -->
    <div style="display:none;">
        <img src="image/spin_1.png">
        <img src="image/spin_2.png">
        <img src="image/back.jpg">
        <img src="image/真夏の夜のカジノ.png">
        <img src="image/yjsp.png">
        <img src="image/mur.png">
        <img src="image/kmr.png">
        <img src="image/inmukun.png">
        <img src="image/kuso.png">
        <img src="image/logo.png">
    </div>

    <div id="entry-overlay">
        <img src="image/真夏の夜のカジノ.png" alt="Logo" class="w-64 mb-8">
        <h1 class="text-2xl mb-8 text-yellow-500 italic">24歳、カジノです</h1>
        <button id="entry-btn" class="bg-red-600 hover:bg-red-500 text-white px-12 py-4 rounded-full text-2xl font-black shadow-[0_0_20px_red]">
            入店する
        </button>
    </div>

    <audio id="audio-ikisugi" src="ikisugi.wav" preload="auto"></audio>
    <audio id="audio-sodayo" src="sodayo.wav" preload="auto"></audio>
    <audio id="audio-yametekure" src="yametekure.wav" preload="auto"></audio>
    <audio id="audio-yattaze" src="yattaze.wav" preload="auto"></audio>
    <audio id="audio-iiyo" src="114514.wav" preload="auto"></audio>
    <audio id="audio-spin" src="butchipa.wav" preload="auto" loop></audio>

    <div id="app-container" class="w-full max-w-md p-6 border-[12px] border-zinc-800 rounded-[50px] shadow-2xl relative">
        <div class="text-center mt-6 mb-8 flex justify-center">
            <img id="title-logo" src="image/真夏の夜のカジノ.png" alt="真夏の夜のカジノ">
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-black/80 rounded-xl p-3 border-2 border-zinc-700">
                <span class="text-[10px] text-zinc-500 block">Credit</span>
                <span id="balance" class="text-3xl font-mono text-green-500">1000</span>
            </div>
            <div class="bg-black/80 rounded-xl p-3 border-2 border-zinc-700 text-right relative">
                <div id="fever-count-badge" class="fever-label">FEVER: <span id="fever-remaining">0</span></div>
                <span class="text-[10px] text-zinc-500 block">Payout</span>
                <span id="payout" class="text-3xl font-mono text-yellow-500">0</span>
            </div>
        </div>

        <div class="flex justify-between gap-2 mb-6">
            <button onclick="changeBet(10)" data-amount="10" class="bet-btn active flex-1 py-1 rounded-lg text-xs font-bold">Bet 10</button>
            <button onclick="changeBet(50)" data-amount="50" class="bet-btn flex-1 py-1 rounded-lg text-xs font-bold">Bet 50</button>
            <button onclick="changeBet(100)" data-amount="100" class="bet-btn flex-1 py-1 rounded-lg text-xs font-bold">Bet 100</button>
            <button onclick="changeBet(500)" data-amount="500" class="bet-btn flex-1 py-1 rounded-lg text-xs font-bold">Bet 500</button>
        </div>

        <div id="machine-frame" class="bg-black/60 p-4 rounded-3xl border-4 border-black flex justify-center gap-2 relative">
            <div class="reel"><div id="reel1" class="reel-inner"></div></div>
            <div class="reel"><div id="reel2" class="reel-inner"></div></div>
            <div class="reel"><div id="reel3" class="reel-inner"></div></div>
        </div>

        <div id="msg" class="h-16 flex items-center justify-center text-center font-bold text-xl text-zinc-300 italic">
            やってやりましょうよ！
        </div>

        <div class="mt-4 flex flex-col gap-6">
            <button id="spin-btn" class="btn-spin"></button>
            <div class="flex justify-between items-center px-2">
                <div id="bet-display" class="text-xs font-bold text-zinc-400">CURRENT BET: 10</div>
                <button id="reset-btn" class="text-[10px] text-zinc-500 underline">再走（リセット）</button>
            </div>
        </div>
        <div id="flash-overlay" class="fixed inset-0 pointer-events-none z-50 opacity-0 bg-white transition-opacity duration-100"></div>
    </div>

    <script>
        // キャラクター画像パスを image/ フォルダに変更
        const charData = [
            { id: 'yjsp', name: '野獣先輩', src: 'image/yjsp.png', multiplier: 81, weight: 2 },
            { id: 'mur', name: 'MUR', src: 'image/mur.png', multiplier: 11, weight: 5 },
            { id: 'kmr', name: 'KMR', src: 'image/kmr.png', multiplier: 5, weight: 10 },
            { id: 'inmukun', name: '淫夢くん', src: 'image/inmukun.png', multiplier: 2, weight: 15 },
            { id: 'kuso', name: '変態糞親父', src: 'image/kuso.png', multiplier: 3, weight: 25 }
        ];

        const feverSymbol = { id: 'logo', name: 'JackPot', src: 'image/logo.png', multiplier: 1145, weight: 1 };

        // SPINボタン画像パスを image/ フォルダに変更
        const SPIN_IMG_NORMAL = "url('image/spin_1.png')";
        const SPIN_IMG_ACTIVE = "url('image/spin_2.png')";

        let balance = 1000;
        let betAmount = 10;
        let isSpinning = false;
        let isFever = false;
        let feverRemaining = 0;
        const REEL_SPEED = [1500, 2000, 2500];

        const reelInners = [document.getElementById('reel1'), document.getElementById('reel2'), document.getElementById('reel3')];
        const balanceEl = document.getElementById('balance');
        const payoutEl = document.getElementById('payout');
        const spinBtn = document.getElementById('spin-btn');
        const msgEl = document.getElementById('msg');
        const frameEl = document.getElementById('machine-frame');
        const flashEl = document.getElementById('flash-overlay');
        const feverBadge = document.getElementById('fever-count-badge');
        const feverRemainingEl = document.getElementById('fever-remaining');
        
        const ikisugiAudio = document.getElementById('audio-ikisugi');
        const sodayoAudio = document.getElementById('audio-sodayo');
        const yametekureAudio = document.getElementById('audio-yametekure');
        const yattazeAudio = document.getElementById('audio-yattaze');
        const iiyoAudio = document.getElementById('audio-iiyo');
        const spinAudio = document.getElementById('audio-spin');

        function safePlay(audio) {
            if (!audio) return;
            audio.currentTime = 0;
            audio.play().catch(e => console.warn(e));
        }

        document.getElementById('entry-btn').addEventListener('click', () => {
            const overlay = document.getElementById('entry-overlay');
            overlay.style.opacity = '0';
            setTimeout(() => overlay.style.display = 'none', 500);
        });

        function init() {
            reelInners.forEach(reel => {
                reel.innerHTML = '';
                for (let i = 0; i < 3; i++) {
                    createSymbol(reel, charData[Math.floor(Math.random() * charData.length)]);
                }
            });
            updateUI();
        }

        function createSymbol(container, data, isBlur = false) {
            const div = document.createElement('div');
            div.className = `symbol ${isBlur ? 'blur' : ''}`;
            div.innerHTML = `<img src="${data.src}" alt="${data.name}"><span class="symbol-label">${data.name}</span>`;
            container.appendChild(div);
        }

        function changeBet(amount) {
            if (isSpinning) return;
            betAmount = amount;
            document.querySelectorAll('.bet-btn').forEach(btn => {
                btn.classList.toggle('active', parseInt(btn.getAttribute('data-amount')) === betAmount);
            });
            document.getElementById('bet-display').textContent = `CURRENT BET: ${betAmount}`;
            updateUI();
        }

        function getWeightedChar() {
            let pool = [...charData];
            if (isFever) pool.push(feverSymbol);
            const total = pool.reduce((s, c) => s + c.weight, 0);
            let r = Math.random() * total;
            for (const c of pool) {
                if (r < c.weight) return c;
                r -= c.weight;
            }
            return pool[0];
        }

        async function startSpin() {
            if (isSpinning || balance < betAmount) return;

            isSpinning = true;
            spinBtn.style.backgroundImage = SPIN_IMG_ACTIVE; // 押した状態に変更
            balance -= betAmount;
            updateUI();

            if (spinAudio) {
                spinAudio.currentTime = 0;
                spinAudio.play().catch(() => {});
            }

            msgEl.textContent = isFever ? 'ｲｷｽｷﾞｨ!!ｲｸｲｸ…' : 'いいよ！来いよ！';
            
            const results = await Promise.all(reelInners.map((reel, i) => animateReel(reel, i)));
            
            if (spinAudio) spinAudio.pause();
            evaluate(results);

            isSpinning = false;
            spinBtn.style.backgroundImage = SPIN_IMG_NORMAL; // 止まったら戻す
            updateUI();
        }

        function animateReel(reel, index) {
            return new Promise(resolve => {
                const targetChar = getWeightedChar();
                const dummyCount = 30 + (index * 10);
                const duration = REEL_SPEED[index];
                const currentHTML = reel.firstElementChild ? reel.firstElementChild.innerHTML : '';
                reel.innerHTML = '';
                
                const startSym = document.createElement('div');
                startSym.className = 'symbol';
                startSym.innerHTML = currentHTML;
                reel.appendChild(startSym);

                for(let i=0; i<dummyCount; i++) {
                    createSymbol(reel, charData[Math.floor(Math.random() * charData.length)], true);
                }
                createSymbol(reel, targetChar);
                createSymbol(reel, charData[0]);

                reel.style.transition = 'none';
                reel.style.transform = 'translateY(0px)';
                requestAnimationFrame(() => {
                    reel.style.transition = `transform ${duration}ms cubic-bezier(0.4, 0, 0.2, 1.1)`;
                    reel.style.transform = `translateY(-${(dummyCount + 1) * 150}px)`;
                });

                setTimeout(() => {
                    reel.style.transition = 'none';
                    reel.style.transform = 'translateY(0px)';
                    reel.innerHTML = '';
                    createSymbol(reel, targetChar);
                    createSymbol(reel, charData[0]);
                    resolve(targetChar);
                }, duration);
            });
        }

        function evaluate(results) {
            const [c1, c2, c3] = results;
            let win = 0;

            if (c1.id === c2.id && c2.id === c3.id) {
                win = c1.multiplier * betAmount;
                msgEl.textContent = `や　っ　た　ぜ (+${win})`;
                triggerFlash();
                if (c1.id === 'yjsp') { safePlay(ikisugiAudio); if (!isFever) startFever(); }
                else if (c1.id === 'mur') safePlay(sodayoAudio);
                else if (c1.id === 'kmr') safePlay(yametekureAudio);
                else if (c1.id === 'kuso') safePlay(yattazeAudio);
            } else if (results.filter(c => c.id === 'yjsp').length === 2) {
                win = betAmount * 5;
                msgEl.textContent = `い　い　よ (+${win})`;
                safePlay(iiyoAudio);
            } else {
                msgEl.textContent = 'ヌッ！';
            }

            if (win > 0) {
                balance += win;
                payoutEl.textContent = win;
            }
            if (isFever) {
                feverRemaining--;
                if (feverRemaining <= 0) endFever();
            }
        }

        function startFever() {
            isFever = true;
            feverRemaining = 10;
            document.body.classList.add('fever-bg');
            feverBadge.style.display = 'block';
        }

        function endFever() {
            isFever = false;
            document.body.classList.remove('fever-bg');
            feverBadge.style.display = 'none';
        }

        function triggerFlash() {
            flashEl.style.opacity = '1';
            setTimeout(() => flashEl.style.opacity = '0', 100);
        }

        function updateUI() {
            balanceEl.textContent = balance;
            feverRemainingEl.textContent = feverRemaining;
            spinBtn.disabled = (balance < betAmount || isSpinning);
        }

        spinBtn.addEventListener('click', startSpin);
        init();
    </script>
</body>
</html>
    </script>
</body>
</html>
