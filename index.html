<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INMU SLOT MACHINE - Oshiru & KBTIT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@800&display=swap');
        
        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background-color: #000;
            color: white;
            overflow-x: hidden;
            touch-action: pan-y;
            transition: all 0.5s;
            background-image: url('./image/back.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px 0;
        }

        /* Mode Styles */
        .fever-bg { background-color: rgba(69, 10, 10, 0.6) !important; background-blend-mode: overlay; }
        .oshiru-bg { background-color: rgba(69, 40, 10, 0.8) !important; background-blend-mode: multiply; filter: sepia(0.3) contrast(1.1); }
        
        #main-layout { display: flex; gap: 20px; width: 100%; max-width: 800px; padding: 10px; transition: all 0.3s ease; position: relative; z-index: 10; }
        .ui-pc #main-layout { flex-direction: row; align-items: flex-start; justify-content: center; }
        .ui-mobile #main-layout { flex-direction: column; align-items: center; }

        #app-container {
            background-color: rgba(24, 24, 27, 0.9);
            backdrop-filter: blur(12px);
            width: 100%;
            max-width: 400px;
            padding: 1.5rem;
            border: 10px solid #27272a;
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            flex-shrink: 0;
            transition: all 0.5s;
        }

        /* Reel Layout */
        .reel { background: rgba(26, 26, 26, 0.9); border: 2px solid #333; border-radius: 8px; overflow: hidden; position: relative; width: 90px; height: 120px; }
        .ui-pc .reel { width: 110px; height: 150px; }
        .reel-inner { position: absolute; width: 100%; }
        .symbol { width: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 5px; height: 120px; }
        .ui-pc .symbol { height: 150px; }
        .symbol img { width: 70px; height: 70px; object-fit: contain; }
        .ui-pc .symbol img { width: 90px; height: 90px; }

        /* KBTIT Falling Gimmick */
        .kbtit-falling {
            position: fixed;
            z-index: 100;
            width: 100px;
            height: 100px;
            cursor: pointer;
            user-select: none;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.3));
            animation: kbtit-sway 3s ease-in-out infinite alternate;
            transition: transform 0.2s;
            pointer-events: auto;
        }
        .kbtit-falling:hover { filter: drop-shadow(0 0 20px #fff); }
        .kbtit-falling:active { transform: scale(0.9); }
        @keyframes kbtit-sway {
            from { transform: translateX(-30px) rotate(-10deg); }
            to { transform: translateX(30px) rotate(10deg); }
        }

        /* Buttons */
        .btn-spin {
            display: block; width: 100%; max-width: 280px; height: 100px; margin: 0 auto;
            background-image: url('./image/spin_1.png'); background-size: contain; background-repeat: no-repeat;
            background-position: center; background-color: transparent; border: none; cursor: pointer;
        }
        .btn-fever { background-image: url('./image/spin_2.png') !important; filter: drop-shadow(0 0 15px #facc15); }
        .btn-oshiru { filter: sepia(1) hue-rotate(-30deg) drop-shadow(0 0 15px #92400e); }
        .btn-spin:active:not(:disabled) { transform: scale(0.92); }
        .btn-spin:disabled { filter: grayscale(1) opacity(0.3); }

        /* Labels */
        .fever-label, .oshiru-label {
            position: absolute; top: -15px; padding: 2px 8px; font-size: 10px; border-radius: 20px; display: none; z-index: 20;
        }
        .fever-label { right: -5px; background: red; box-shadow: 0 0 10px red; transform: rotate(15deg); }
        .oshiru-label { left: -5px; background: #78350f; color: #fde68a; box-shadow: 0 0 10px #78350f; transform: rotate(-15deg); }

        .oshiru-timer { width: 100%; height: 4px; background: #451a03; border-radius: 2px; margin-top: 5px; display: none; overflow: hidden; }
        .oshiru-timer-bar { width: 100%; height: 100%; background: #facc15; }

        #entry-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.95);
            z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body class="ui-mobile">

    <div id="entry-overlay">
        <img src="./image/真夏の夜のカジノ.png" alt="Logo" class="w-48 mb-6">
        <button id="entry-btn" class="bg-red-600 hover:bg-red-500 text-white px-10 py-3 rounded-full text-xl font-black shadow-[0_0_20px_red]">入店する</button>
        <div class="mt-8 flex gap-4 bg-zinc-900 p-2 rounded-xl border border-zinc-700">
            <label class="cursor-pointer text-xs text-white px-4 py-2 rounded-lg bg-zinc-800"><input type="radio" name="ui-mode" value="mobile" checked> 📱 スマホ</label>
            <label class="cursor-pointer text-xs text-white px-4 py-2 rounded-lg bg-zinc-800"><input type="radio" name="ui-mode" value="pc"> 💻 PC</label>
        </div>
    </div>

    <!-- Audio -->
    <audio id="audio-bgm" src="./audio/yaranaika.mp3" loop></audio>
    <audio id="audio-fever" src="./audio/4545.mp3" loop></audio>
    <audio id="audio-ikisugi" src="./audio/ikisugi.wav"></audio>
    <audio id="audio-nasu" src="./audio/nasu.wav"></audio>
    <audio id="audio-yattaze" src="./audio/yattaze.wav"></audio>
    <audio id="audio-spin" src="./audio/butchipa.wav" loop></audio>
    <audio id="audio-aa" src="./audio/aa.wav" loop></audio>

    <div id="main-layout">
        <div id="app-container" class="relative">
            <div class="text-center mt-4 mb-4"><img src="./image/真夏の夜のカジノ.png" alt="Logo" class="mx-auto h-12"></div>

            <div class="grid grid-cols-2 gap-3 mb-4">
                <div class="bg-black/80 rounded-xl p-2 border-2 border-zinc-700">
                    <span class="text-[8px] text-zinc-500 block">CREDIT</span>
                    <span id="balance" class="text-2xl font-mono text-green-500">1000</span>
                </div>
                <div class="bg-black/80 rounded-xl p-2 border-2 border-zinc-700 text-right relative">
                    <div id="fever-badge" class="fever-label">FEVER: <span id="fever-rem">0</span></div>
                    <div id="oshiru-badge" class="oshiru-label">汚汁モード中</div>
                    <span class="text-[8px] text-zinc-500 block">PAYOUT</span>
                    <span id="payout" class="text-2xl font-mono text-yellow-500">0</span>
                </div>
            </div>

            <div class="bg-black/60 p-2 rounded-2xl border-2 border-zinc-800 flex flex-col gap-1 items-center mb-4">
                <div class="flex justify-center gap-1">
                    <div class="reel"><div id="reel1" class="reel-inner"></div></div>
                    <div class="reel"><div id="reel2" class="reel-inner"></div></div>
                    <div class="reel"><div id="reel3" class="reel-inner"></div></div>
                </div>
                <div id="oshiru-timer" class="oshiru-timer"><div id="oshiru-timer-bar" class="oshiru-timer-bar"></div></div>
            </div>

            <div id="msg" class="h-10 text-center font-bold text-sm text-zinc-300 italic mb-2">いらっしゃいませ！</div>

            <button id="spin-btn" class="btn-spin"></button>
            <div class="mt-4 flex justify-between items-center text-[10px] text-zinc-500 font-bold uppercase">
                <div id="bet-info">BET: 10</div>
                <button id="reset-btn" class="underline">再走（リセット）</button>
            </div>

            <!-- Secret Code UI -->
            <div class="mt-6 p-3 bg-zinc-900/50 rounded-xl border border-zinc-800">
                <p class="text-[9px] text-zinc-500 mb-2 font-bold uppercase tracking-widest text-center">Secret Code</p>
                <div class="flex gap-2">
                    <input type="text" id="promo-input" placeholder="コードを入力" class="flex-1 bg-black/50 border border-zinc-700 rounded-lg px-3 py-2 text-xs focus:outline-none focus:border-red-600">
                    <button id="promo-btn" class="bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-lg text-xs font-bold transition-colors">適用</button>
                </div>
            </div>
        </div>

        <div id="side-panel" class="flex flex-col gap-4 w-full max-w-[200px]">
            <div class="bg-zinc-900/80 p-4 rounded-2xl border border-zinc-700 text-center">
                <p class="text-[10px] text-zinc-500 mb-2 uppercase">Auto Play</p>
                <button id="auto-btn" class="w-full bg-zinc-800 py-2 rounded-lg text-xs font-bold border border-zinc-600">オート開始</button>
            </div>
            
            <div class="bg-zinc-900/80 p-4 rounded-2xl border border-zinc-700 text-center">
                <p class="text-[10px] text-zinc-500 mb-2 uppercase">SNS Share</p>
                <div class="grid grid-cols-1 gap-2">
                    <button id="share-btn" class="w-full bg-sky-600 hover:bg-sky-500 py-2 rounded-lg text-xs font-bold transition-colors">𝕏(X)で共有</button>
                    <button id="share-karotter-btn" class="w-full bg-green-600 hover:bg-green-500 py-2 rounded-lg text-xs font-bold transition-colors">Karotterで共有</button>
                </div>
                <p id="share-info" class="text-[8px] text-zinc-600 mt-2">残り共有回数: 10</p>
            </div>

            <div id="debug-panel" class="hidden bg-zinc-900/80 p-4 rounded-2xl border border-yellow-900">
                <p class="text-[10px] text-yellow-600 mb-2 font-bold">DEBUG</p>
                <button id="force-oshiru" class="w-full bg-amber-900 text-[10px] py-1 rounded mb-1">強制汚汁</button>
                <button id="force-kbtit" class="w-full bg-zinc-700 text-[10px] py-1 rounded">KBTIT召喚</button>
            </div>
        </div>
    </div>

    <div id="flash-overlay" class="fixed inset-0 pointer-events-none z-50 opacity-0 bg-white transition-opacity duration-100"></div>

    <script>
        // Elements
        const spinBtn = document.getElementById('spin-btn');
        const balanceEl = document.getElementById('balance');
        const payoutEl = document.getElementById('payout');
        const shareBtn = document.getElementById('share-btn');
        const shareKarotterBtn = document.getElementById('share-karotter-btn');
        const promoBtn = document.getElementById('promo-btn');
        const promoInput = document.getElementById('promo-input');
        const shareInfoEl = document.getElementById('share-info');

        // Setup UI
        const uiMode = document.querySelectorAll('input[name="ui-mode"]');
        uiMode.forEach(r => r.addEventListener('change', e => {
            document.body.className = `ui-${e.target.value}`;
        }));

        // State
        let balance = 1000;
        let bet = 10;
        let isSpinning = false;
        let isFever = false;
        let isOshiru = false;
        let feverRem = 0;
        let isAuto = false;
        let shareCount = 0;
        const MAX_SHARE = 10;
        let promoUsed = false;

        const charData = [
            { id: 'yjsp', name: '野獣先輩', src: './image/yjsp.png', multiplier: 810, weight: 4 },
            { id: 'mur', name: 'MUR', src: './image/mur.png', multiplier: 25, weight: 10 },
            { id: 'kmr', name: 'KMR', src: './image/kmr.png', multiplier: 10, weight: 15 },
            { id: 'inmukun', name: '淫夢くん', src: './image/inmukun.png', multiplier: 2, weight: 30 },
            { id: 'kuso', name: '変態糞親父', src: './image/kuso.png', multiplier: 3, weight: 25 }
        ];

        const audio = {
            bgm: document.getElementById('audio-bgm'),
            fever: document.getElementById('audio-fever'),
            ikisugi: document.getElementById('audio-ikisugi'),
            nasu: document.getElementById('audio-nasu'),
            yattaze: document.getElementById('audio-yattaze'),
            spin: document.getElementById('audio-spin'),
            aa: document.getElementById('audio-aa')
        };

        function safePlay(a) { a.currentTime = 0; a.play().catch(()=>{}); }

        // Initialize Reels
        const reels = [document.getElementById('reel1'), document.getElementById('reel2'), document.getElementById('reel3')];
        function initReels() {
            reels.forEach(r => {
                r.innerHTML = '';
                addSymbol(r, charData[0]);
            });
        }

        function addSymbol(container, data) {
            const div = document.createElement('div');
            div.className = 'symbol';
            div.innerHTML = `<img src="${data.src}"><span class="text-[8px] mt-1 text-zinc-500">${data.name}</span>`;
            container.appendChild(div);
        }

        async function startSpin() {
            const cost = isOshiru ? 0 : (isAuto ? bet + 10 : bet);
            if (isSpinning || balance < cost) {
                if(isAuto) { isAuto = false; updateAutoBtn(); }
                return;
            }

            isSpinning = true;
            balance -= cost;
            updateUI();

            const spinSfx = (isFever || isOshiru) ? audio.aa : audio.spin;
            safePlay(spinSfx);

            const results = await Promise.all(reels.map((r, i) => animate(r, i)));
            
            spinSfx.pause();
            await evaluate(results);
            
            isSpinning = false;
            updateUI();
            if(isAuto) setTimeout(startSpin, 1000);
        }

        function animate(reel, i) {
            return new Promise(resolve => {
                const target = getChar();
                const symH = document.body.classList.contains('ui-pc') ? 150 : 120;
                const count = 20 + (i * 10);
                const duration = 1500 + (i * 500);

                reel.innerHTML = '';
                for(let n=0; n<count; n++) addSymbol(reel, charData[Math.floor(Math.random()*charData.length)]);
                addSymbol(reel, target);
                addSymbol(reel, charData[0]);

                reel.style.transition = 'none';
                reel.style.transform = `translateY(0)`;
                requestAnimationFrame(() => {
                    reel.style.transition = `transform ${duration}ms cubic-bezier(0.1, 0, 0.2, 1)`;
                    reel.style.transform = `translateY(-${count * symH}px)`;
                });

                setTimeout(() => {
                    reel.style.transition = 'none';
                    reel.style.transform = `translateY(0)`;
                    reel.innerHTML = '';
                    addSymbol(reel, target);
                    resolve(target);
                }, duration);
            });
        }

        function getChar() {
            let pool = [...charData];
            if (isOshiru || isFever) pool.push({ id: 'logo', multiplier: 114514, weight: 5, name: 'JACKPOT', src: './image/logo.png' });
            const total = pool.reduce((s, c) => s + c.weight, 0);
            let r = Math.random() * total;
            for (const c of pool) { if (r < c.weight) return c; r -= c.weight; }
            return pool[0];
        }

        async function evaluate(res) {
            const ids = res.map(r => r.id);
            let win = 0;

            if (ids.includes('kmr') && ids.includes('mur') && ids.includes('yjsp') && !isOshiru) {
                balance += 810;
                msg('汚汁発射！！ (+810)');
                safePlay(audio.nasu);
                startOshiru();
                return;
            }

            if (ids[0] === ids[1] && ids[1] === ids[2]) {
                const multi = (isFever || isOshiru) ? (Math.floor(Math.random()*8)+3) : 1;
                win = res[0].multiplier * bet * multi;
                msg(`やったぜ！ (${multi}倍配当: +${win})`);
                safePlay(audio.yattaze);
                if (ids[0] === 'yjsp' && !isFever) startFever();
                flash();
            }

            if (win > 0) { balance += win; payoutEl.textContent = win; }
            if (isFever) { feverRem--; if(feverRem <= 0) endFever(); }
        }

        function startOshiru() {
            isOshiru = true;
            if(isFever) endFever();
            document.body.classList.add('oshiru-bg');
            spinBtn.classList.add('btn-oshiru');
            document.getElementById('oshiru-badge').style.display = 'block';
            document.getElementById('oshiru-timer').style.display = 'block';
            
            let time = 10000;
            const bar = document.getElementById('oshiru-timer-bar');
            const itv = setInterval(() => {
                time -= 100;
                bar.style.width = `${(time/10000)*100}%`;
                if (time <= 0) {
                    clearInterval(itv);
                    isOshiru = false;
                    document.body.classList.remove('oshiru-bg');
                    spinBtn.classList.remove('btn-oshiru');
                    document.getElementById('oshiru-badge').style.display = 'none';
                    document.getElementById('oshiru-timer').style.display = 'none';
                    updateUI();
                }
            }, 100);
        }

        function startFever() {
            isFever = true; 
            feverRem = Math.floor(Math.random() * 81) + 20; 
            document.body.classList.add('fever-bg');
            spinBtn.classList.add('btn-fever');
            document.getElementById('fever-badge').style.display = 'block';
            audio.bgm.pause(); safePlay(audio.fever);
        }

        function endFever() {
            isFever = false;
            document.body.classList.remove('fever-bg');
            spinBtn.classList.remove('btn-fever');
            document.getElementById('fever-badge').style.display = 'none';
            audio.fever.pause(); audio.bgm.play();
        }

        function updateUI() {
            balanceEl.textContent = balance;
            document.getElementById('fever-rem').textContent = feverRem;
            spinBtn.disabled = isSpinning || (balance < bet && !isOshiru);
            shareInfoEl.textContent = `残り共有回数: ${MAX_SHARE - shareCount}`;
            if(shareCount >= MAX_SHARE) {
                shareBtn.disabled = true;
                shareKarotterBtn.disabled = true;
            }
        }

        function msg(t) { document.getElementById('msg').textContent = t; }
        function flash() { const f = document.getElementById('flash-overlay'); f.style.opacity = '1'; setTimeout(()=>f.style.opacity='0', 100); }

        function spawnKBTIT() {
            if (isOshiru) return;
            const k = document.createElement('img');
            k.src = './image/kbtit.png';
            k.className = 'kbtit-falling';
            k.style.left = `${Math.random() * 80 + 5}%`;
            k.style.top = `-120px`;
            document.body.appendChild(k);

            let pos = -120;
            const speed = 1.2 + (Math.random() * 0.8);
            const fall = () => {
                if (!k.parentElement) return;
                pos += speed;
                k.style.top = `${pos}px`;
                if (pos > window.innerHeight + 150) k.remove();
                else requestAnimationFrame(fall);
            };

            k.onclick = (e) => {
                e.stopPropagation();
                balance += 250;
                updateUI();
                msg('ありがとナス！ (+250 CREDIT)');
                safePlay(audio.nasu);
                k.style.transform = 'scale(0) rotate(180deg)';
                k.style.opacity = '0';
                k.style.transition = 'all 0.3s';
                setTimeout(() => k.remove(), 300);
            };
            requestAnimationFrame(fall);
        }

        function scheduleKBTIT() {
            const next = 15000 + (Math.random() * 10000);
            setTimeout(() => { spawnKBTIT(); scheduleKBTIT(); }, next);
        }

        function updateAutoBtn() {
            const autoBtn = document.getElementById('auto-btn');
            autoBtn.textContent = isAuto ? 'オート停止' : 'オート開始';
            autoBtn.classList.toggle('bg-green-700', isAuto);
        }

        // Event Listeners
        document.getElementById('entry-btn').onclick = () => {
            document.getElementById('entry-overlay').style.display = 'none';
            audio.bgm.play();
            scheduleKBTIT();
        };

        spinBtn.onclick = startSpin;
        
        document.getElementById('auto-btn').onclick = () => {
            isAuto = !isAuto;
            updateAutoBtn();
            if(isAuto && !isSpinning) startSpin();
        };

        function handleShare(platform) {
            if (shareCount >= MAX_SHARE) return;
            const contentText = `真夏の夜のカジノ ～THE IMP～ で遊んでます！\nhttps://yakekusolsu.github.io/inmuslot/\n現在の所持金: ${balance}クレジット\n今ならコード「YARANAIKA」で+5000クレジット！\n#真夏の夜のカジノ`;
            const text = encodeURIComponent(contentText);
            
            let url = "";
            if (platform === 'x') {
                url = `https://twitter.com/intent/tweet?text=${text}`;
            } else if (platform === 'karotter') {
                url = `https://karotter.com/intent/post?text=${text}`;
            }
            
            window.open(url, '_blank');
            
            // クレジット付与（模擬的な遅延）
            setTimeout(() => { 
                shareCount++; 
                balance += 200; 
                updateUI(); 
                safePlay(audio.nasu);
                msg('共有ありがとナス！ (+200)');
            }, 500);
        }

        shareBtn.addEventListener('click', () => handleShare('x'));
        shareKarotterBtn.addEventListener('click', () => handleShare('karotter'));

        promoBtn.addEventListener('click', () => {
            const code = promoInput.value.trim().toUpperCase();
            if (code === "YARANAIKA" && !promoUsed) {
                promoUsed = true; 
                balance += 5000; 
                updateUI();
                promoInput.value = ""; 
                msg('隠しコード適用！ (+5000)');
                safePlay(audio.ikisugi);
            }
        });

        document.getElementById('reset-btn').onclick = () => { location.reload(); };

        window.addEventListener('keydown', e => {
            if(e.shiftKey && e.code === 'Space') {
                document.body.className = 'ui-pc';
                document.getElementById('debug-panel').classList.toggle('hidden');
            }
        });
        
        document.getElementById('force-oshiru').onclick = startOshiru;
        document.getElementById('force-kbtit').onclick = spawnKBTIT;

        initReels();
    </script>
</body>
</html>
